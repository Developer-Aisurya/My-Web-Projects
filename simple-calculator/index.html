<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
 
  <div class="app">
 
    <!-- ── History Panel ── -->
    <div class="history-panel" id="historyPanel">
      <div class="history-panel__header">
        <span class="history-panel__title">History</span>
        <button class="history-panel__clear" id="clearHistory" title="Clear history">Clear</button>
      </div>
      <ul class="history-panel__list" id="historyList">
        <li class="history-panel__empty">No calculations yet.</li>
      </ul>
    </div>
 
    <!-- ── Calculator ── -->
    <div class="calc">
 
      <!-- Top bar -->
      <div class="topbar">
        <button class="icon-btn history-toggle" id="historyToggle" title="Toggle history">
          <!-- Clock icon -->
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
        <span class="topbar__label">Calculator</span>
        <!-- Theme toggle -->
        <button class="icon-btn theme-toggle" id="themeToggle" title="Toggle theme">
          <svg class="sun-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1"  x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3"  y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="moon-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
 
      <!-- Display -->
      <div class="display" id="display">
        <div class="expr" id="expr"></div>
        <div class="current" id="current">0</div>
      </div>
 
      <!-- Button Grid -->
      <div class="grid">
        <button class="btn fn" data-action="clear">AC</button>
        <button class="btn fn" data-action="sign">+/−</button>
        <button class="btn fn" data-action="percent">%</button>
        <button class="btn op" data-action="op" data-value="÷">÷</button>
 
        <button class="btn" data-action="digit" data-value="7">7</button>
        <button class="btn" data-action="digit" data-value="8">8</button>
        <button class="btn" data-action="digit" data-value="9">9</button>
        <button class="btn op" data-action="op" data-value="×">×</button>
 
        <button class="btn" data-action="digit" data-value="4">4</button>
        <button class="btn" data-action="digit" data-value="5">5</button>
        <button class="btn" data-action="digit" data-value="6">6</button>
        <button class="btn op" data-action="op" data-value="−">−</button>
 
        <button class="btn" data-action="digit" data-value="1">1</button>
        <button class="btn" data-action="digit" data-value="2">2</button>
        <button class="btn" data-action="digit" data-value="3">3</button>
        <button class="btn op" data-action="op" data-value="+">+</button>
 
        <button class="btn zero" data-action="digit" data-value="0">0</button>
        <button class="btn" data-action="dot">.</button>
        <button class="btn eq" data-action="equals">=</button>
      </div>
    </div>
 
  </div>
 
  <script src="script.js"></script>
</body>
</html>
