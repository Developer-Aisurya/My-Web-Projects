<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="dashboard">
        <header>
            <div class="brand">
                <h1>TaskFlow <span>Pro</span></h1>
                <p id="currentDate"></p>
            </div>
            <button id="themeToggle" aria-label="Toggle Theme">🌙</button>
        </header>

        <section class="stats-card">
            <div class="stats-info">
                <span>Daily Progress</span>
                <span id="progressText">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progressFill"></div>
            </div>
        </section>

        <section class="input-area">
            <div class="main-input">
                <input type="text" id="taskInput" placeholder="Add a new task..." required>
                <button id="addTaskBtn">Add</button>
            </div>
            <div class="sub-input">
                <input type="date" id="dueDate">
                <input type="text" id="searchInput" placeholder="Search tasks...">
            </div>
        </section>

        <nav class="filter-pills">
            <button data-filter="all" class="pill active">All</button>
            <button data-filter="pending" class="pill">Pending</button>
            <button data-filter="completed" class="pill">Completed</button>
        </nav>

        <ul id="taskList"></ul>

        <div id="emptyState" class="empty-state">
            <p>No tasks match your criteria.</p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
