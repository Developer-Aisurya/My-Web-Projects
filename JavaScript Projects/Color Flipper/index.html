<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Flipper Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>🎨 Color Flipper</nav>

  <div class="color-canvas">
    <div class="card">

      <button class="random-color-btn">Generate Color</button>
      <button class="copy-btn">Copy</button>

      <p class="text">Click to generate a random color</p>

      <div class="color-code">
        <div class="color-name">Color Name</div>
        <div class="hex-code">#FFFFFF</div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
